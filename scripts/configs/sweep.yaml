program: scripts/tune_prcut_cifar10.py
method: bayes
metric:
  name: accuracy
  goal: maximize
parameters:
  data.model:
    values:
      - clipvitL14
      - dinov2
      - dinov3b
  graph.n_neighbors:
    values: [20, 50, 100, 200]
  training.lr:
    distribution: log_uniform_values
    min: 1e-5
    max: 1e-2
  training.weight_decay:
    distribution: log_uniform_values
    min: 1e-6
    max: 1e-2
  training.batch_pair_size:
    values: [2048, 8192, 32768]
  training.ema:
    values: [0.9, 0.95, 0.99]
  training.loss_scale_balance:
    distribution: log_uniform_values
    min: 0.01
    max: 10.0
  model.arch:
    values:
      - linear
      - mlp1
      - mlp2
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - ${args_no_hyphens}
